name: ice CI
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - master
      - 'release/v*'
jobs:
  tests-and-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v3
        with:
          path: main-repo
      - name: Checkout the target 'master' branch of 'mobile-app-secrets'
        uses: actions/checkout@v3
        with:
          repository: ice-blockchain/mobile-app-secrets
          ref: master
          token: ${{ secrets.ICE_CI_CD_BOT_GH_PAT }}
          path: mobile-app-secrets
          fetch-depth: 0
      - name: Run script to copy the configuration folder
        run: |
          set -o xtrace
          # ls -l $GITHUB_WORKSPACE/main-repo
          # mkdir -p $GITHUB_WORKSPACE/main-repo/configuration && ls -l $GITHUB_WORKSPACE/main-repo/configuration
          # ls -l $GITHUB_WORKSPACE/mobile-app-secrets
          ls -la $GITHUB_WORKSPACE/mobile-app-secrets/configuration
          cp -rfp $GITHUB_WORKSPACE/mobile-app-secrets/configuration $GITHUB_WORKSPACE/main-repo/
          ls -la $GITHUB_WORKSPACE/main-repo/configuration
      - uses: actions/setup-node@master
      - uses: c-hive/gha-yarn-cache@v2
      - name: Install npm dependencies
        run: |
          cd main-repo
          yarn

      - name: Check types
        run: |
          cd main-repo
          yarn check-types
      - name: Lint
        run: |
          cd main-repo
          yarn lint
      - name: Run tests
        run: |
          cd main-repo
          yarn test
