name: ice CI
on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - master
      - 'releases/v*'
jobs:
  tests-and-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@master
      - uses: c-hive/gha-yarn-cache@v2
      - name: Install npm dependencies
        run: |
          yarn
      - name: Check types
        run: |
          yarn check-types
      - name: Lint
        run: |
          yarn lint
      - name: Run tests
        run: |
          yarn test
